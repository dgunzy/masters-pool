name: Build and Push Docker Image

on:
  push:
    branches: ["main"]
    tags: ["v*.*.*"]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/masters-pool
          tags: |
            # Always push :latest on main branch
            type=raw,value=latest,enable={{is_default_branch}}
            # Time-sortable immutable tag consumed by Flux ImagePolicy.
            # Format: <UTC timestamp>Z-sha-<short sha>, e.g. 20260420T153012Z-sha-abc1234
            # Flux orders these numerically on the leading timestamp to find the newest build.
            type=raw,value={{date 'YYYYMMDDTHHmmss' tz='Etc/UTC'}}Z-sha-{{sha}},enable={{is_default_branch}}
            # Semver from git tags (e.g. v1.2.3 → 1.2.3, 1.2, 1)
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
